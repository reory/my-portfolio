<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ project_name }} | Portfolio</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        nav { border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }
        .project-card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; background: #fafafa; }
        pre {
            background-color: #f4f4f4; /* Light grey background */
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;       /* Adds a scrollbar if the text is too wide */
            white-space: pre-wrap;  /* Forces text to wrap to the next line */
            word-wrap: break-word;  /* Breaks long strings (like paths) so they don't jump out */
            border: 1px solid #ddd;
        }

        code {
            font-family: "Courier New", Courier, monospace;
            font-size: 0.9em;
        }  
    </style>
</head>
<body>
    <nav>
        <strong>My Portfolio</strong> | <a href="index.html">Home</a>
    </nav>
    
    <div class="project-card">
        <h1>{{ project_name }}</h1>
        {{ project_content }}
    </div>
</body>
</html>
